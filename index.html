
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD System</title>
  <link rel="stylesheet" href="text.css" />
</head>
<body>
  <div class="crud">
    <div class="head">
      <h1>CRUD</h1>
      <p>Product Management System</p>
    </div>

    <div class="inputs">
      <input id="title" type="text" placeholder="Title" />

      <div class="price">
        <input onkeyup="gettotal()" id="price" type="number" placeholder="Price" />
        <input onkeyup="gettotal()" id="raxts" type="number" placeholder="Raxts" />
        <input onkeyup="gettotal()" id="ads" type="number" placeholder="Ads" />
        <input onkeyup="gettotal()" id="disconunt" type="number" placeholder="Discount" />
        <small id="total"></small>
      </div>

      <input id="count" type="number" placeholder="Count" />
      <input id="category" type="text" placeholder="Category" />
      <button id="supmit" type="button">Create</button>
    </div>

    <div class="seachrblck">
      <input id="seacher" type="text" placeholder="Search..." onkeyup="searchData(this.value)" />
      <div class="ptn">
        <button id="seachr-By-title" type="button" onclick="getSearchMood('title')">Search by Title</button>
        <button id="seachr-By-categor" type="button" onclick="getSearchMood('category')">Search by Category</button>
      </div>
    </div>

    <div class="outputs">
      <div id="deletedata"></div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Price</th>
              <th>Raxts</th>
              <th>Ads</th>
              <th>Discount</th>
              <th>Total</th>
              <th>Category</th>
              <th>Update</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="text.js"></script>
</body>
</html>
